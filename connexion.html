<!-- login.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Studio Créatif</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-section {
            max-width: 1100px;
            margin: 70px auto 110px;
            padding: 0 6%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: center;
        }

        .auth-visual {
            position: relative;
            display: flex;
            justify-content: center;
        }

        .auth-visual .frame {
            position: relative;
            width: 100%;
            max-width: 440px;
            aspect-ratio: 4/5;
            border-radius: 34px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(150, 100, 30, 0.35);
            border: 6px solid rgba(255, 255, 255, 0.6);
        }

        .auth-visual .frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .auth-toggle {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .toggle-btn {
            background: none;
            border: none;
            font-size: 1.1rem;
            font-weight: 600;
            color: #999;
            cursor: pointer;
            padding: 5px 10px;
            position: relative;
            transition: color 0.3s;
        }

        .toggle-btn.active {
            color: #111;
        }

        .toggle-btn.active::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #111;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            border-color: #111;
            outline: none;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #111;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: #333;
        }

        #messageBox {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-weight: 500;
            display: none;
        }

        .user-profile-header {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 6px 12px 6px 6px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.1);
            transition: background 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-decoration: none;
        }
        .user-profile-header:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .user-profile-header img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold);
        }
        .user-profile-header span {
            color: #fff;
            font-size: 14px;
            font-weight: 500;
        }
        .user-profile-header .fa-chevron-down {
            color: rgba(255,255,255,0.6);
            font-size: 12px;
        }
        .nav-cta {
            background: var(--ink);
            color: #fff !important;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 12px 22px;
            border-radius: 30px;
            transition: transform 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
            cursor: pointer;
            text-decoration: none;
        }
        .nav-cta:hover { transform: translateY(-2px); }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="logo">
                <img src="7a6cb36c8ac94c808158e11ac34168d3.jpg" alt="Logo Studio Créatif">
                <div class="logo-text">Studio Créatif<span>Atelier &amp; Design</span></div>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="apropos.html">À propos</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div id="headerRight">
                <!-- Remplacé par JS -->
            </div>
        </nav>
    </header>

    <section class="auth-section">
        <div class="auth-visual">
            <div class="frame">
                <img src="https://images.unsplash.com/photo-1513364776144-60967b0f800f?q=80&w=1000" alt="Art Visuel">
            </div>
        </div>

        <div class="auth-container">
            <div class="auth-toggle">
                <button class="toggle-btn active" onclick="switchForm('login')">Se connecter</button>
                <button class="toggle-btn" onclick="switchForm('register')">S'inscrire</button>
            </div>

            <div id="messageBox"></div>

            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label for="loginEmail">Adresse e-mail</label>
                    <input type="email" id="loginEmail" required placeholder="exemple@domaine.com">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Mot de passe</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>
                <button type="submit" class="submit-btn">Connexion</button>
            </form>

            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="registerNom">Nom</label>
                    <input type="text" id="registerNom" required placeholder="Dupont">
                </div>
                <div class="form-group">
                    <label for="registerPrenom">Prénom</label>
                    <input type="text" id="registerPrenom" required placeholder="Jean">
                </div>
                <div class="form-group">
                    <label for="registerEmail">Adresse e-mail</label>
                    <input type="email" id="registerEmail" required placeholder="jean.dupont@exemple.com">
                </div>
                <div class="form-group">
                    <label for="registerPassword">Mot de passe</label>
                    <input type="password" id="registerPassword" required placeholder="Minimum 6 caractères">
                </div>
                <button type="submit" class="submit-btn">Créer mon compte</button>
            </form>
        </div>
    </section>

    <script>
        function updateHeader() {
            const headerRight = document.getElementById('headerRight');
            const user = JSON.parse(localStorage.getItem('utilisateur') || 'null');
            
            if (user && user.prenom) {
                const avatar = localStorage.getItem('userAvatar') || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.prenom) + '&background=e5a968&color=fff&size=128';
                headerRight.innerHTML = `
                    <a href="moncompte.html" class="user-profile-header">
                        <img src="${avatar}" alt="${user.prenom}">
                        <span>${user.prenom}</span>
                        <i class="fa-solid fa-chevron-down"></i>
                    </a>
                `;
            } else {
                headerRight.innerHTML = `<a href="login.html" class="nav-cta">Connexion</a>`;
            }
        }

        const messageBox = document.getElementById('messageBox');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');

        function switchForm(type) {
            const buttons = document.querySelectorAll('.toggle-btn');
            messageBox.style.display = 'none';
            
            if(type === 'login') {
                buttons[0].classList.add('active');
                buttons[1].classList.remove('active');
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
            } else {
                buttons[0].classList.remove('active');
                buttons[1].classList.add('active');
                loginForm.classList.remove('active');
                registerForm.classList.add('active');
            }
        }

        function afficherMessage(texte, estSucces) {
            messageBox.textContent = texte;
            messageBox.style.display = 'block';
            if(estSucces) {
                messageBox.style.background = '#e6f4ea';
                messageBox.style.color = '#137333';
            } else {
                messageBox.style.background = '#fce8e6';
                messageBox.style.color = '#c5221f';
            }
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const mot_de_passe = document.getElementById('loginPassword').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, mot_de_passe })
                });
                const data = await res.json();
                afficherMessage(data.message, data.success);
                if (data.success) {
                    loginForm.reset();
                    localStorage.setItem('utilisateur', JSON.stringify({ 
                        nom: data.nom,
                        prenom: data.prenom, 
                        email: email 
                    }));
                    window.location.href = 'index.html';
                }
            } catch (err) {
                afficherMessage('Impossible de contacter le serveur.', false);
            }
        });

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const nom = document.getElementById('registerNom').value;
            const prenom = document.getElementById('registerPrenom').value;
            const email = document.getElementById('registerEmail').value;
            const mot_de_passe = document.getElementById('registerPassword').value;

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nom, prenom, email, mot_de_passe })
                });
                const data = await res.json();
                afficherMessage(data.message, data.success);
                if (data.success) {
                    registerForm.reset();
                    // Basculer sur le formulaire de connexion
                    switchForm('login');
                }
            } catch (err) {
                afficherMessage('Impossible de contacter le serveur.', false);
            }
        });

        updateHeader();
        window.addEventListener('storage', updateHeader);
    </script>
</body>
</html>
