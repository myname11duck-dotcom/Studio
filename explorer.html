<!-- explorer.html - Page d'exploration style Pinterest -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorer | Studio Créatif</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== STYLES EXPLORER ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --pink-deep: #c98a3e;
            --pink-mid: #e3a544;
            --pink-soft: #ffe9a8;
            --pink-pale: #fffbf2;
            --ink: #4a2f17;
            --ink-soft: rgba(74, 47, 23, 0.62);
            --gold: #f6c667;
            --bg: #fffdf7;
            --radius: 18px;
            --shadow: 0 12px 30px rgba(150,100,30,0.06);
        }

        html, body {
            font-family: 'Montserrat', sans-serif;
            color: var(--ink);
            background: var(--bg);
            scroll-behavior: smooth;
            min-height: 100vh;
        }

        /* HEADER */
        header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 250, 249, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(233, 79, 130, 0.08);
            padding: 0 6%;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo i {
            color: var(--pink-deep);
            font-size: 28px;
        }
        .logo span {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--ink);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-profile-header {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 6px 12px 6px 6px;
            border-radius: 30px;
            background: var(--pink-pale);
            transition: background 0.3s;
            border: 1px solid rgba(74, 47, 23, 0.1);
            text-decoration: none;
            color: var(--ink);
        }
        .user-profile-header:hover { background: var(--pink-soft); }
        .user-profile-header img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--pink-deep);
        }
        .user-profile-header span {
            font-size: 14px;
            font-weight: 500;
        }

        /* ===== SEARCH HEADER ===== */
        .search-header {
            max-width: 1400px;
            margin: 20px auto 10px;
            padding: 0 6%;
        }

        .search-bar-container {
            display: flex;
            align-items: center;
            gap: 16px;
            background: #fff;
            border-radius: 60px;
            padding: 6px 6px 6px 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border: 1px solid rgba(74, 47, 23, 0.08);
            transition: all 0.3s ease;
        }

        .search-bar-container:focus-within {
            border-color: var(--pink-deep);
            box-shadow: 0 4px 30px rgba(201, 138, 62, 0.15);
        }

        .search-bar-container input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 14px;
            font-family: 'Montserrat', sans-serif;
            color: var(--ink);
            padding: 12px 0;
            background: transparent;
        }

        .search-bar-container input::placeholder {
            color: var(--ink-soft);
            opacity: 0.6;
        }

        .search-bar-container .search-type {
            display: flex;
            gap: 4px;
            background: var(--pink-pale);
            border-radius: 30px;
            padding: 4px;
        }

        .search-bar-container .search-type button {
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            background: transparent;
            color: var(--ink-soft);
            transition: all 0.3s ease;
        }

        .search-bar-container .search-type button.active {
            background: linear-gradient(135deg, var(--pink-deep), var(--pink-mid));
            color: #fff;
            box-shadow: 0 4px 12px rgba(201, 138, 62, 0.3);
        }

        .search-bar-container .search-type button:hover:not(.active) {
            background: rgba(201, 138, 62, 0.1);
        }

        .search-bar-container .search-btn {
            background: linear-gradient(135deg, var(--pink-deep), var(--pink-mid));
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-bar-container .search-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(201, 138, 62, 0.4);
        }

        /* ===== FILTRES ===== */
        .filters-bar {
            max-width: 1400px;
            margin: 16px auto 0;
            padding: 0 6%;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filters-bar .filter-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .filters-bar .filter-btn {
            padding: 8px 18px;
            border-radius: 30px;
            border: 1px solid rgba(74, 47, 23, 0.12);
            background: #fff;
            color: var(--ink-soft);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filters-bar .filter-btn:hover {
            border-color: var(--pink-deep);
            color: var(--pink-deep);
            background: var(--pink-pale);
        }

        .filters-bar .filter-btn.active {
            background: var(--pink-deep);
            color: #fff;
            border-color: var(--pink-deep);
        }

        .filters-bar .filter-btn .count {
            background: rgba(255,255,255,0.2);
            padding: 0 8px;
            border-radius: 20px;
            font-size: 10px;
            margin-left: 4px;
        }

        .filters-bar .filter-btn.active .count {
            background: rgba(255,255,255,0.3);
        }

        /* ===== GRID MASONRY ===== */
        .explorer-container {
            max-width: 1400px;
            margin: 20px auto 40px;
            padding: 0 6%;
        }

        .masonry-grid {
            column-count: 4;
            column-gap: 16px;
            padding: 0;
        }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 16px;
            border-radius: 16px;
            overflow: hidden;
            background: #fff;
            border: 1px solid rgba(74, 47, 23, 0.06);
            box-shadow: 0 4px 15px rgba(150,100,30,0.05);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .masonry-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 40px rgba(150,100,30,0.15);
        }

        .masonry-item img {
            width: 100%;
            display: block;
            background: var(--pink-pale);
        }

        .masonry-item .item-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 16px 16px;
            background: linear-gradient(transparent, rgba(0,0,0,0.5));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .masonry-item:hover .item-overlay {
            opacity: 1;
        }

        .masonry-item .item-overlay .item-title {
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .masonry-item .item-overlay .item-author {
            color: rgba(255,255,255,0.8);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .masonry-item .item-overlay .item-author img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .masonry-item .item-actions {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .masonry-item:hover .item-actions {
            opacity: 1;
        }

        .masonry-item .item-actions button {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(4px);
            color: var(--ink);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .masonry-item .item-actions button:hover {
            transform: scale(1.1);
            background: #fff;
        }

        .masonry-item .item-actions .fav-btn.active {
            color: #e74c3c;
        }

        .masonry-item .item-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
        }

        /* ===== USER CARD ===== */
        .user-card {
            break-inside: avoid;
            margin-bottom: 16px;
            border-radius: 16px;
            overflow: hidden;
            background: #fff;
            border: 1px solid rgba(74, 47, 23, 0.06);
            box-shadow: 0 4px 15px rgba(150,100,30,0.05);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .user-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 40px rgba(150,100,30,0.15);
        }

        .user-card img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--pink-deep);
        }

        .user-card .user-info {
            flex: 1;
        }

        .user-card .user-info h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--ink);
        }

        .user-card .user-info p {
            font-size: 13px;
            color: var(--ink-soft);
        }

        .user-card .user-stats {
            display: flex;
            gap: 16px;
            margin-top: 4px;
        }

        .user-card .user-stats span {
            font-size: 12px;
            color: var(--ink-soft);
        }

        .user-card .user-stats strong {
            color: var(--pink-deep);
        }

        .user-card .follow-btn {
            padding: 8px 20px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, var(--pink-deep), var(--pink-mid));
            color: #fff;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .user-card .follow-btn:hover {
            transform: scale(1.05);
        }

        .user-card .follow-btn.following {
            background: #e0e0e0;
            color: var(--ink-soft);
        }

        /* ===== LOAD MORE ===== */
        .load-more-container {
            text-align: center;
            padding: 30px 0;
        }

        .load-more-btn {
            padding: 14px 40px;
            border-radius: 50px;
            border: 2px solid var(--pink-deep);
            background: transparent;
            color: var(--pink-deep);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .load-more-btn:hover {
            background: var(--pink-deep);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(201, 138, 62, 0.3);
        }

        /* ===== MODAL DETAIL ===== */
        .detail-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .detail-modal.active {
            display: flex;
        }

        .detail-modal .modal-content {
            background: #fff;
            border-radius: 24px;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: modalIn 0.4s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .detail-modal .modal-close {
            position: sticky;
            top: 16px;
            right: 16px;
            float: right;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(4px);
            font-size: 20px;
            cursor: pointer;
            z-index: 10;
            margin: 16px;
            transition: all 0.3s ease;
        }

        .detail-modal .modal-close:hover {
            transform: scale(1.1);
            background: #fff;
        }

        .detail-modal .modal-body {
            padding: 0 40px 40px;
        }

        .detail-modal .modal-body img {
            width: 100%;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .detail-modal .modal-body h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 8px;
        }

        .detail-modal .modal-body .meta {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .detail-modal .modal-body .meta .author {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .detail-modal .modal-body .meta .author img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0;
            border: 2px solid var(--pink-deep);
        }

        .detail-modal .modal-body .meta .date {
            color: var(--ink-soft);
            font-size: 13px;
        }

        .detail-modal .modal-body .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .detail-modal .modal-body .tags span {
            padding: 4px 14px;
            border-radius: 20px;
            background: var(--pink-pale);
            color: var(--pink-deep);
            font-size: 12px;
            font-weight: 500;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--ink-soft);
        }

        .empty-state i {
            font-size: 60px;
            color: var(--pink-soft);
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            color: var(--ink);
            margin-bottom: 8px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1200px) {
            .masonry-grid {
                column-count: 3;
            }
        }

        @media (max-width: 900px) {
            .masonry-grid {
                column-count: 2;
            }
            .search-bar-container {
                flex-wrap: wrap;
                padding: 12px;
                border-radius: 24px;
            }
            .search-bar-container input {
                width: 100%;
                padding: 10px 0;
            }
            .search-bar-container .search-type {
                order: 2;
                width: 100%;
                justify-content: center;
            }
            .search-bar-container .search-btn {
                order: 3;
                width: 100%;
                border-radius: 30px;
                height: 44px;
            }
            .detail-modal {
                padding: 20px;
            }
            .detail-modal .modal-body {
                padding: 0 20px 20px;
            }
        }

        @media (max-width: 640px) {
            .masonry-grid {
                column-count: 1;
            }
            header {
                padding: 0 20px;
                height: 60px;
            }
            .filters-bar {
                gap: 8px;
            }
            .filters-bar .filter-btn {
                padding: 6px 14px;
                font-size: 11px;
            }
            .user-card {
                flex-wrap: wrap;
                text-align: center;
                justify-content: center;
            }
            .user-card .follow-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fa-solid fa-palette"></i>
            <span>Studio Créatif</span>
        </div>
        <div class="header-right">
            <div class="user-profile-header" id="headerUser">
                <img src="images/avatar.png" alt="profil" id="headerAvatar">
                <span id="headerNom">Mon compte</span>
            </div>
        </div>
    </header>

    <!-- ===== SEARCH BAR ===== -->
    <div class="search-header">
        <div class="search-bar-container">
            <input type="text" id="searchInput" placeholder="Rechercher des créations ou des utilisateurs...">
            <div class="search-type">
                <button class="active" data-type="all" id="searchAll">Tout</button>
                <button data-type="drawings" id="searchDrawings">🎨 Créations</button>
                <button data-type="users" id="searchUsers">👤 Utilisateurs</button>
            </div>
            <button class="search-btn" id="searchBtn">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>
    </div>

    <!-- ===== FILTERS ===== -->
    <div class="filters-bar" id="filtersBar">
        <div class="filter-group" id="filterGroup">
            <button class="filter-btn active" data-filter="all">Toutes <span class="count" id="countAll">0</span></button>
            <button class="filter-btn" data-filter="recent">🕐 Récentes <span class="count" id="countRecent">0</span></button>
            <button class="filter-btn" data-filter="popular">🔥 Populaires <span class="count" id="countPopular">0</span></button>
            <button class="filter-btn" data-filter="favorites">⭐ Favoris <span class="count" id="countFavorites">0</span></button>
        </div>
    </div>

    <!-- ===== GRID ===== -->
    <div class="explorer-container">
        <div class="masonry-grid" id="masonryGrid">
            <!-- Rempli par JS -->
        </div>

        <div class="load-more-container" id="loadMoreContainer">
            <button class="load-more-btn" id="loadMoreBtn">Charger plus</button>
        </div>
    </div>

    <!-- ===== MODAL DETAIL ===== -->
    <div class="detail-modal" id="detailModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">&times;</button>
            <div class="modal-body" id="modalBody">
                <!-- Rempli par JS -->
            </div>
        </div>
    </div>

    <script>
        // ===== CHARGEMENT DES INFOS UTILISATEUR =====
        function loadUserInfo() {
            const user = JSON.parse(localStorage.getItem('utilisateur') || 'null');
            if (user) {
                document.getElementById('headerNom').textContent = user.prenom || 'Mon compte';
                const avatar = localStorage.getItem('userAvatar') || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.prenom || 'User') + '&background=c98a3e&color=fff&size=128';
                document.getElementById('headerAvatar').src = avatar;
            }
        }
        loadUserInfo();

        // ===============================
        // DONNÉES
        // ===============================
        let allItems = [];
        let filteredItems = [];
        let currentPage = 0;
        const ITEMS_PER_PAGE = 12;
        let currentFilter = 'all';
        let currentSearch = '';
        let currentType = 'all';
        let favorites = JSON.parse(localStorage.getItem('explorer_favorites') || '[]');

        // ===============================

            const titles = [
                'Crépuscule doré', 'Jardin secret', 'Onde marine', 'Forêt enchantée',

                'Danse des feuilles', 'Reflet d\'automne', 'Brume matinale', 'Étoile filante',
                'Cascade de lumière', 'Papillon bleu', 'Fleurs sauvages', 'Sentier de la forêt',

            ];

            const tags = [
                ['nature', 'paysage'], ['fleurs', 'jardin'], ['mer', 'vague'], ['forêt', 'mystère'],
                ['lumière', 'matin'], ['été', 'rêve'], ['horizon', 'voyage'], ['silence', 'méditation'],
                ['automne', 'feuilles'], ['brume', 'matin'], ['étoile', 'nuit'], ['cascade', 'eau'],
                ['papillon', 'couleur'], ['fleurs', 'printemps'], ['forêt', 'sentier'], ['coucher', 'soleil']
            ];

            const items = [];
            const currentUser = JSON.parse(localStorage.getItem('utilisateur') || '{}');

            for (let i = 0; i < 45; i++) {
                const user = users[i % users.length];
                const title = titles[i % titles.length];
                const tagSet = tags[i % tags.length];
                const isFav = favorites.includes(i);
                
                // Hauteurs aléatoires pour l'effet masonry
                const heights = [300, 350, 400, 280, 380, 320, 450, 360];
                const height = heights[i % heights.length];

                items.push({
                    id: i,
                    image: `https://picsum.photos/seed/studio${i+100}/${400}/${height}`,
                    title: title,
                    author: user,
                    email: user.email,
                    date: new Date(Date.now() - i * 86400000 * (i % 3 + 1)).toISOString(),
                    tags: tagSet,
                    favori: isFav,
                    likes: Math.floor(Math.random() * 200) + 10,
                    views: Math.floor(Math.random() * 500) + 50,
                    height: height,
                    isCurrentUser: currentUser.email === user.email
                });
            }

            return items;
        }

        // ===============================
        // RENDU
        // ===============================
        function renderItems(items) {
            const grid = document.getElementById('masonryGrid');
            
            if (items.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;width:100%;">
                        <i class="fa-solid fa-search"></i>
                        <h3>Aucun résultat trouvé</h3>
                        <p>Essayez de modifier votre recherche ou vos filtres.</p>
                    </div>
                `;
                document.getElementById('loadMoreContainer').style.display = 'none';
                return;
            }

            const start = 0;
            const end = Math.min(items.length, (currentPage + 1) * ITEMS_PER_PAGE);
            const displayed = items.slice(0, end);

            let html = '';
            
            displayed.forEach(item => {
                if (item.type === 'user') {
                    // Carte utilisateur
                    html += `
                        <div class="user-card" data-id="${item.id}" data-type="user">
                            <img src="${item.avatar}" alt="${item.name}">
                            <div class="user-info">
                                <h3>${item.name}</h3>
                                <p>${item.email}</p>
                                <div class="user-stats">
                                    <span><strong>${item.drawings || 0}</strong> créations</span>
                                    <span><strong>${item.followers || 0}</strong> abonnés</span>
                                </div>
                            </div>
                            <button class="follow-btn ${item.following ? 'following' : ''}" data-email="${item.email}">
                                ${item.following ? '✓ Abonné' : '+ Suivre'}
                            </button>
                        </div>
                    `;
                } else {
                    // Carte dessin
                    const favClass = item.favori ? 'active' : '';
                    html += `
                        <div class="masonry-item" data-id="${item.id}" data-type="drawing">
                            <img src="${item.image}" alt="${item.title}" loading="lazy" style="height:${item.height}px;object-fit:cover;">
                            <div class="item-badge">${item.tags[0] || 'Art'}</div>
                            <div class="item-actions">
                                <button class="fav-btn ${favClass}" data-id="${item.id}" title="Favori">
                                    <i class="fa-solid fa-heart"></i>
                                </button>
                                <button class="share-btn" data-id="${item.id}" title="Partager">
                                    <i class="fa-solid fa-share-nodes"></i>
                                </button>
                            </div>
                            <div class="item-overlay">
                                <div class="item-title">${item.title}</div>
                                <div class="item-author">
                                    <img src="${item.author.avatar}" alt="${item.author.name}">
                                    ${item.author.name} · ${item.likes} ❤️
                                </div>
                            </div>
                        </div>
                    `;
                }
            });

            grid.innerHTML = html;

            // Afficher/masquer le bouton "Charger plus"
            const loadMore = document.getElementById('loadMoreContainer');
            if (end >= items.length) {
                loadMore.style.display = 'none';
            } else {
                loadMore.style.display = 'block';
            }

            // Événements
            attachEvents();
        }

        function attachEvents() {
            // Clic sur un item (dessin)
            document.querySelectorAll('.masonry-item').forEach(el => {
                el.addEventListener('click', function(e) {
                    if (e.target.closest('.item-actions')) return;
                    const id = parseInt(this.dataset.id);
                    const item = allItems.find(i => i.id === id);
                    if (item) openDetail(item);
                });
            });

            // Clic sur une carte utilisateur
            document.querySelectorAll('.user-card').forEach(el => {
                el.addEventListener('click', function(e) {
                    if (e.target.closest('.follow-btn')) return;
                    const email = this.querySelector('.follow-btn')?.dataset.email;
                    if (email) {
                        // Ouvrir le profil de l'utilisateur
                        const user = allItems.find(i => i.type === 'user' && i.email === email);
                        if (user) openUserDetail(user);
                    }
                });
            });

            // Boutons favoris
            document.querySelectorAll('.fav-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = parseInt(this.dataset.id);
                    toggleFavorite(id);
                });
            });

            // Boutons partager
            document.querySelectorAll('.share-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = parseInt(this.dataset.id);
                    const item = allItems.find(i => i.id === id);
                    if (item) shareItem(item);
                });
            });

            // Boutons suivre
            document.querySelectorAll('.follow-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const email = this.dataset.email;
                    toggleFollow(email, this);
                });
            });
        }

        // ===============================
        // FONCTIONS
        // ===============================
        function toggleFavorite(id) {
            const item = allItems.find(i => i.id === id);
            if (!item) return;

            item.favori = !item.favori;
            
            if (item.favori) {
                if (!favorites.includes(id)) favorites.push(id);
            } else {
                favorites = favorites.filter(f => f !== id);
            }
            
            localStorage.setItem('explorer_favorites', JSON.stringify(favorites));
            
            // Mettre à jour l'affichage
            const btn = document.querySelector(`.fav-btn[data-id="${id}"]`);
            if (btn) {
                btn.classList.toggle('active');
            }
            
            // Si on est sur le filtre "Favoris", rafraîchir
            if (currentFilter === 'favorites') {
                applyFilters();
            }

            // Notification
            showToast(item.favori ? '⭐ Ajouté aux favoris !' : '💔 Retiré des favoris', 'info');
        }

        function shareItem(item) {
            if (navigator.share) {
                navigator.share({
                    title: item.title,
                    text: `Découvre "${item.title}" par ${item.author.name} sur Studio Créatif ! 🎨`,
                    url: window.location.href,
                }).catch(() => {});
            } else {
                // Copier dans le presse-papier
                const text = `"${item.title}" par ${item.author.name} - Studio Créatif 🎨`;
                navigator.clipboard.writeText(text).then(() => {
                    showToast('📋 Lien copié dans le presse-papier !', 'success');
                }).catch(() => {
                    // Fallback
                    prompt('Copie le lien :', window.location.href);
                });
            }
        }

        function toggleFollow(email, btn) {
            const isFollowing = btn.classList.contains('following');
            btn.classList.toggle('following');
            btn.textContent = isFollowing ? '+ Suivre' : '✓ Abonné';
            
            // Mettre à jour le compteur
            const userCard = btn.closest('.user-card');
            if (userCard) {
                const stats = userCard.querySelector('.user-stats span:last-child');
                if (stats) {
                    const current = parseInt(stats.textContent) || 0;
                    stats.innerHTML = `<strong>${isFollowing ? current - 1 : current + 1}</strong> abonnés`;
                }
            }
            
            showToast(isFollowing ? 'Vous ne suivez plus cet utilisateur' : 'Vous suivez maintenant cet utilisateur !', 'success');
        }

        function openDetail(item) {
            const modal = document.getElementById('detailModal');
            const body = document.getElementById('modalBody');
            
            const date = new Date(item.date).toLocaleDateString('fr-FR', {
                day: 'numeric', month: 'long', year: 'numeric'
            });
            
            body.innerHTML = `
                <img src="${item.image}" alt="${item.title}">
                <div style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;gap:8px;">
                    <div>
                        <h2>${item.title}</h2>
                        <div class="meta">
                            <div class="author">
                                <img src="${item.author.avatar}" alt="${item.author.name}">
                                <span style="font-weight:500;">${item.author.name}</span>
                            </div>
                            <span class="date">📅 ${date}</span>
                            <span class="date">❤️ ${item.likes} likes</span>
                            <span class="date">👁️ ${item.views} vues</span>
                        </div>
                    </div>
                    <button class="fav-btn ${item.favori ? 'active' : ''}" data-id="${item.id}" style="background:none;border:none;font-size:28px;cursor:pointer;color:${item.favori ? '#e74c3c' : '#ccc'};">
                        <i class="fa-solid fa-heart"></i>
                    </button>
                </div>
                <div class="tags">
                    ${item.tags.map(t => `<span>#${t}</span>`).join('')}
                </div>
                <p style="color:var(--ink-soft);line-height:1.6;font-size:14px;">
                    Cette magnifique création a été réalisée par ${item.author.name}. 
                    Elle fait partie de la galerie Studio Créatif et a été appréciée par ${item.likes} personnes.
                </p>
                <div style="margin-top:16px;display:flex;gap:12px;">
                    <button onclick="window.location.href='moncompte.html'" style="padding:10px 24px;border-radius:30px;border:none;background:linear-gradient(135deg,var(--pink-deep),var(--pink-mid));color:#fff;font-weight:600;cursor:pointer;">
                        🎨 Créer aussi
                    </button>
                    <button onclick="shareItem(allItems.find(i => i.id === ${item.id}))" style="padding:10px 24px;border-radius:30px;border:1px solid var(--pink-deep);background:transparent;color:var(--pink-deep);font-weight:600;cursor:pointer;">
                        📤 Partager
                    </button>
                </div>
            `;
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
            
            // Événement du bouton favori dans le modal
            const favBtn = body.querySelector('.fav-btn');
            if (favBtn) {
                favBtn.addEventListener('click', function() {
                    const id = parseInt(this.dataset.id);
                    toggleFavorite(id);
                    // Mettre à jour le bouton
                    const item = allItems.find(i => i.id === id);
                    if (item) {
                        this.style.color = item.favori ? '#e74c3c' : '#ccc';
                        this.classList.toggle('active');
                    }
                });
            }
        }

        function openUserDetail(user) {
            showToast(`👤 Profil de ${user.name}`, 'info');
            // Rediriger vers moncompte.html avec un paramètre
            window.location.href = `moncompte.html?user=${encodeURIComponent(user.email)}`;
        }

        // ===============================
        // RECHERCHE ET FILTRES
        // ===============================
        function applyFilters() {
            let items = [...allItems];

            // Filtre par type
            if (currentType === 'drawings') {
                items = items.filter(i => i.type !== 'user');
            } else if (currentType === 'users') {
                items = items.filter(i => i.type === 'user');
            }

            // Filtre par recherche
            if (currentSearch.trim()) {
                const search = currentSearch.toLowerCase().trim();
                items = items.filter(item => {
                    if (item.type === 'user') {
                        return item.name.toLowerCase().includes(search) || 
                               item.email.toLowerCase().includes(search);
                    }
                    return item.title.toLowerCase().includes(search) ||
                           item.author.name.toLowerCase().includes(search) ||
                           item.tags.some(t => t.toLowerCase().includes(search));
                });
            }

            // Filtres
            if (currentFilter === 'recent') {
                items.sort((a, b) => new Date(b.date) - new Date(a.date));
            } else if (currentFilter === 'popular') {
                items.sort((a, b) => (b.likes || 0) - (a.likes || 0));
            } else if (currentFilter === 'favorites') {
                items = items.filter(i => i.favori);
            }

            // Mettre à jour les compteurs
            updateCounts(items);
            
            // Réinitialiser la pagination
            currentPage = 0;
            filteredItems = items;
            renderItems(items);
        }

        function updateCounts(items) {
            const all = items.filter(i => i.type !== 'user');
            const recent = [...all].sort((a, b) => new Date(b.date) - new Date(a.date));
            const popular = [...all].sort((a, b) => (b.likes || 0) - (a.likes || 0));
            const favorites = all.filter(i => i.favori);

            document.getElementById('countAll').textContent = all.length;
            document.getElementById('countRecent').textContent = Math.min(recent.length, 10);
            document.getElementById('countPopular').textContent = Math.min(popular.length, 10);
            document.getElementById('countFavorites').textContent = favorites.length;
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer') || createToastContainer();
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function createToastContainer() {
            const container = document.createElement('div');
            container.id = 'toastContainer';
            container.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                z-index: 9999;
                display: flex;
                flex-direction: column;
                gap: 10px;
            `;
            document.body.appendChild(container);
            
            // Ajouter les styles des toasts si pas déjà présents
            if (!document.querySelector('#toastStyles')) {
                const style = document.createElement('style');
                style.id = 'toastStyles';
                style.textContent = `
                    .toast {
                        padding: 14px 20px;
                        border-radius: 12px;
                        color: #fff;
                        font-weight: 500;
                        font-size: 13px;
                        box-shadow: 0 8px 24px rgba(0,0,0,0.15);
                        animation: slideIn 0.3s ease;
                        max-width: 380px;
                        backdrop-filter: blur(10px);
                    }
                    .toast-success { background: linear-gradient(135deg, #4caf50, #43a047); }
                    .toast-error { background: linear-gradient(135deg, #f44336, #e53935); }
                    .toast-warning { background: linear-gradient(135deg, #ff9800, #f57c00); }
                    .toast-info { background: linear-gradient(135deg, #2196f3, #1976d2); }
                    .toast.fade-out {
                        animation: slideOut 0.3s ease forwards;
                    }
                    @keyframes slideIn {
                        from { transform: translateX(100%); opacity: 0; }
                        to { transform: translateX(0); opacity: 1; }
                    }
                    @keyframes slideOut {
                        from { transform: translateX(0); opacity: 1; }
                        to { transform: translateX(100%); opacity: 0; }
                    }
                `;
                document.head.appendChild(style);
            }
            return container;
        }

        // ===============================
        // ÉVÉNEMENTS
        // ===============================
        // Recherche
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');

        searchInput.addEventListener('input', function() {
            currentSearch = this.value;
            applyFilters();
        });

        searchBtn.addEventListener('click', function() {
            applyFilters();
        });

        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                applyFilters();
            }
        });

        // Types de recherche
        document.querySelectorAll('.search-type button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.search-type button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentType = this.dataset.type;
                applyFilters();
            });
        });

        // Filtres
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                applyFilters();
            });
        });

        // Charger plus
        document.getElementById('loadMoreBtn').addEventListener('click', function() {
            currentPage++;
            renderItems(filteredItems);
        });

        // Modal
        document.getElementById('modalClose').addEventListener('click', function() {
            document.getElementById('detailModal').classList.remove('active');
            document.body.style.overflow = '';
        });

        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.getElementById('detailModal').classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        // ===============================
        // INITIALISATION
        // ===============================
        // Générer les données
        const mockData = generateMockData();
        
        // Ajouter des utilisateurs factices
        const userItems = [
            { id: 1000, type: 'user', name: 'Sophie Martin', email: 'sophie@email.com', avatar: 'https://ui-avatars.com/api/?name=Sophie+Martin&background=c98a3e&color=fff&size=128', drawings: 12, followers: 45, following: false },
            { id: 1001, type: 'user', name: 'Thomas Dubois', email: 'thomas@email.com', avatar: 'https://ui-avatars.com/api/?name=Thomas+Dubois&background=4a2f17&color=fff&size=128', drawings: 8, followers: 32, following: false },
            { id: 1002, type: 'user', name: 'Emma Lefevre', email: 'emma@email.com', avatar: 'https://ui-avatars.com/api/?name=Emma+Lefevre&background=e3a544&color=fff&size=128', drawings: 15, followers: 67, following: false },
            { id: 1003, type: 'user', name: 'Lucas Bernard', email: 'lucas@email.com', avatar: 'https://ui-avatars.com/api/?name=Lucas+Bernard&background=f6c667&color=4a2f17&size=128', drawings: 6, followers: 23, following: false },
            { id: 1004, type: 'user', name: 'Julie Petit', email: 'julie@email.com', avatar: 'https://ui-avatars.com/api/?name=Julie+Petit&background=ffe9a8&color=4a2f17&size=128', drawings: 20, followers: 89, following: false }
        ];

        allItems = [...mockData, ...userItems];
        
        // Restaurer les favoris
        allItems.forEach(item => {
            if (favorites.includes(item.id)) {
                item.favori = true;
            }
        });

        applyFilters();

        console.log('📌 Explorer chargé !');
        console.log(`📊 ${allItems.length} éléments disponibles`);
        console.log('💡 Utilise la recherche et les filtres pour explorer les créations et les utilisateurs !');
    </script>
</body>
</html>
