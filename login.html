<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Studio Créatif</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-section {
            max-width: 1100px;
            margin: 70px auto 110px;
            padding: 0 6%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: center;
        }

        .auth-visual {
            position: relative;
            display: flex;
            justify-content: center;
        }

        .auth-visual .frame {
            position: relative;
            width: 100%;
            max-width: 440px;
            aspect-ratio: 4/5;
            border-radius: 34px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(150, 100, 30, 0.35);
            border: 6px solid rgba(255, 255, 255, 0.6);
        }

        .auth-visual .frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .auth-toggle {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .toggle-btn {
            background: none;
            border: none;
            font-size: 1.1rem;
            font-weight: 600;
            color: #999;
            cursor: pointer;
            padding: 5px 10px;
            position: relative;
            transition: color 0.3s;
        }

        .toggle-btn.active {
            color: #111;
        }

        .toggle-btn.active::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #111;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            border-color: #111;
            outline: none;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #111;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: #333;
        }

        #messageBox {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-weight: 500;
            display: none;
        }

        /* ===== HEADER AVEC PROFIL ===== */
        header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 250, 249, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(233, 79, 130, 0.08);
            padding: 0 6%;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        nav {
            max-width: 1240px;
            margin: 0 auto;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo img {
            height: 46px;
            width: 46px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid var(--pink-soft);
        }

        .logo-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 600;
            line-height: 1.1;
            color: var(--ink);
        }

        .logo-text span {
            display: block;
            font-family: 'Montserrat', sans-serif;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--pink-deep);
            font-weight: 500;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #fff;
            padding: 6px;
            border-radius: 30px;
            box-shadow: 0 4px 18px rgba(233, 79, 130, 0.08);
        }

        .nav-links a {
            color: var(--ink-soft);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.3px;
            padding: 9px 18px;
            border-radius: 24px;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .nav-links a:hover { color: var(--pink-deep); }

        .nav-links a.active {
            background: linear-gradient(135deg, var(--pink-deep), var(--pink-mid));
            color: #fff;
            box-shadow: 0 6px 14px rgba(233, 79, 130, 0.3);
        }

        .nav-cta {
            background: var(--ink);
            color: #fff !important;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 12px 22px;
            border-radius: 30px;
            transition: transform 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            flex-shrink: 0;
        }

        .nav-cta:hover { transform: translateY(-2px); }

        .user-profile-header {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 6px 12px 6px 6px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.1);
            transition: background 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-decoration: none;
            flex-shrink: 0;
        }

        .user-profile-header:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .user-profile-header img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold);
        }

        .user-profile-header span {
            color: #fff;
            font-size: 14px;
            font-weight: 500;
        }

        .user-profile-header .fa-chevron-down {
            color: rgba(255,255,255,0.6);
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .auth-section {
                grid-template-columns: 1fr;
                gap: 30px;
                margin: 40px auto 60px;
            }
            .auth-container {
                padding: 24px;
            }
            header {
                padding: 0 20px;
                height: auto;
                flex-wrap: wrap;
                gap: 10px;
                padding-top: 10px;
                padding-bottom: 10px;
            }
            nav {
                flex-wrap: wrap;
                gap: 10px;
            }
            .nav-links {
                order: 3;
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
            }
            .nav-links a {
                padding: 6px 12px;
                font-size: 12px;
            }
            .user-profile-header span {
                display: none;
            }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="logo">
                <img src="7a6cb36c8ac94c808158e11ac34168d3.jpg" alt="Logo Studio Créatif">
                <div class="logo-text">Studio Créatif<span>Atelier &amp; Design</span></div>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="apropos.html">À propos</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div id="headerRight"></div>
        </nav>
    </header>

    <section class="auth-section">
        <div class="auth-visual">
            <div class="frame">
                <img src="https://images.unsplash.com/photo-1513364776144-60967b0f800f?q=80&w=1000" alt="Art Visuel">
            </div>
        </div>

        <div class="auth-container">
            <div class="auth-toggle">
                <button class="toggle-btn active" onclick="switchForm('login')">Se connecter</button>
                <button class="toggle-btn" onclick="switchForm('register')">S'inscrire</button>
            </div>

            <div id="messageBox"></div>

            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label for="loginEmail">Adresse e-mail</label>
                    <input type="email" id="loginEmail" required placeholder="exemple@domaine.com">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Mot de passe</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>
                <button type="submit" class="submit-btn">Connexion</button>
            </form>

            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="registerNom">Nom</label>
                    <input type="text" id="registerNom" required placeholder="Dupont">
                </div>
                <div class="form-group">
                    <label for="registerPrenom">Prénom</label>
                    <input type="text" id="registerPrenom" required placeholder="Jean">
                </div>
                <div class="form-group">
                    <label for="registerEmail">Adresse e-mail</label>
                    <input type="email" id="registerEmail" required placeholder="jean.dupont@exemple.com">
                </div>
                <div class="form-group">
                    <label for="registerPassword">Mot de passe</label>
                    <input type="password" id="registerPassword" required placeholder="Minimum 6 caractères">
                </div>
                <button type="submit" class="submit-btn">Créer mon compte</button>
            </form>
        </div>
    </section>

    <script>
        // ===== GESTION DU HEADER =====
        function updateHeader() {
            const headerRight = document.getElementById('headerRight');
            const user = JSON.parse(localStorage.getItem('utilisateur') || 'null');
            
            if (user && user.prenom) {
                const avatar = localStorage.getItem('userAvatar') || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.prenom) + '&background=e5a968&color=fff&size=128';
                headerRight.innerHTML = `
                    <a href="moncompte.html" class="user-profile-header">
                        <img src="${avatar}" alt="${user.prenom}">
                        <span>${user.prenom}</span>
                        <i class="fa-solid fa-chevron-down"></i>
                    </a>
                `;
            } else {
                headerRight.innerHTML = `<a href="login.html" class="nav-cta">Connexion</a>`;
            }
        }

        // ===== FONCTION POUR ENREGISTRER UN UTILISATEUR DANS LE LOCALSTORAGE =====
        function registerUserInLocalStorage(nom, prenom, email) {
            let users = JSON.parse(localStorage.getItem('registered_users') || '[]');
            // Vérifier si l'utilisateur existe déjà
            const exists = users.some(u => u.email === email);
            if (!exists) {
                users.push({ 
                    nom: nom, 
                    prenom: prenom, 
                    email: email,
                    dateInscription: new Date().toISOString()
                });
                localStorage.setItem('registered_users', JSON.stringify(users));
                console.log('✅ Utilisateur enregistré dans le localStorage:', { nom, prenom, email });
                return true;
            } else {
                console.log('ℹ️ Utilisateur déjà enregistré:', email);
                return false;
            }
        }

        // ===== FONCTION POUR METTRE À JOUR UN UTILISATEUR =====
        function updateUserInLocalStorage(nom, prenom, email) {
            let users = JSON.parse(localStorage.getItem('registered_users') || '[]');
            const index = users.findIndex(u => u.email === email);
            if (index !== -1) {
                users[index].nom = nom;
                users[index].prenom = prenom;
                localStorage.setItem('registered_users', JSON.stringify(users));
                console.log('✅ Utilisateur mis à jour dans le localStorage:', { nom, prenom, email });
                return true;
            }
            return false;
        }

        // ===== GESTION DES FORMULAIRES =====
        const messageBox = document.getElementById('messageBox');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');

        function switchForm(type) {
            const buttons = document.querySelectorAll('.toggle-btn');
            messageBox.style.display = 'none';
            
            if(type === 'login') {
                buttons[0].classList.add('active');
                buttons[1].classList.remove('active');
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
            } else {
                buttons[0].classList.remove('active');
                buttons[1].classList.add('active');
                loginForm.classList.remove('active');
                registerForm.classList.add('active');
            }
        }

        function afficherMessage(texte, estSucces) {
            messageBox.textContent = texte;
            messageBox.style.display = 'block';
            if(estSucces) {
                messageBox.style.background = '#e6f4ea';
                messageBox.style.color = '#137333';
            } else {
                messageBox.style.background = '#fce8e6';
                messageBox.style.color = '#c5221f';
            }
        }

        // ===== LOGIN =====
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const mot_de_passe = document.getElementById('loginPassword').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, mot_de_passe })
                });
                const data = await res.json();
                afficherMessage(data.message, data.success);
                
                if (data.success) {
                    loginForm.reset();
                    
                    // Stocker les informations de l'utilisateur
                    const userData = {
                        nom: data.nom || '',
                        prenom: data.prenom || '',
                        email: email
                    };
                    localStorage.setItem('utilisateur', JSON.stringify(userData));
                    
                    // S'assurer que l'utilisateur est dans la liste des utilisateurs enregistrés
                    registerUserInLocalStorage(data.nom || '', data.prenom || '', email);
                    
                    // Rediriger vers l'accueil
                    window.location.href = 'index.html';
                }
            } catch (err) {
                afficherMessage('Impossible de contacter le serveur.', false);
            }
        });

        // ===== REGISTER =====
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const nom = document.getElementById('registerNom').value;
            const prenom = document.getElementById('registerPrenom').value;
            const email = document.getElementById('registerEmail').value;
            const mot_de_passe = document.getElementById('registerPassword').value;

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nom, prenom, email, mot_de_passe })
                });
                const data = await res.json();
                afficherMessage(data.message, data.success);
                
                if (data.success) {
                    // Enregistrer l'utilisateur dans le localStorage pour la recherche
                    registerUserInLocalStorage(nom, prenom, email);
                    
                    registerForm.reset();
                    messageBox.style.display = 'block';
                    messageBox.style.background = '#e6f4ea';
                    messageBox.style.color = '#137333';
                    messageBox.textContent = '✅ Compte créé avec succès ! Vous pouvez maintenant vous connecter.';
                    
                    // Basculer automatiquement sur le formulaire de connexion après 2 secondes
                    setTimeout(() => {
                        switchForm('login');
                        messageBox.textContent = 'Connectez-vous avec vos identifiants.';
                    }, 2000);
                }
            } catch (err) {
                afficherMessage('Impossible de contacter le serveur.', false);
            }
        });

        // ===== INITIALISATION =====
        updateHeader();
        window.addEventListener('storage', updateHeader);
    </script>
</body>
</html>
