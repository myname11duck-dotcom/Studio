<style>
        /* Style global de la page inspiré de ta photo de lys */
        body {
            background: linear-gradient(135deg, #fdf6e2 0%, #fae3d9 50%, #f3bda1 100%);
            background-attachment: fixed;
            margin: 0;
            font-family: sans-serif;
        }

        /* Boîte principale avec effet verre transparent (Glassmorphism) */
        .compte-wrapper { 
            max-width: 750px; 
            margin: 60px auto; 
            padding: 40px 30px; 
            text-align: center; 
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .infos-perso {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .infos-perso h2 {
            margin: 0 0 10px 0;
            color: #4a3b32;
        }

        .infos-perso p {
            font-size: 1.1rem;
            color: #6b5b52;
            margin: 5px 0;
        }

        /* Zone de dessin / Canvas */
        .canvas-section h3 {
            color: #4a3b32;
            margin-bottom: 20px;
        }

        canvas {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            cursor: crosshair;
            touch-action: none;
            display: block;
            margin: 0 auto 20px;
        }

        .canvas-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn-canvas {
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .btn-clear {
            background: #e0e0e0;
            color: #444;
        }

        .btn-save {
            background: #111;
            color: white;
        }

        .btn-canvas:hover {
            transform: translateY(-2px);
        }

        #messageDessin {
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* Galerie d'images */
        .galerie-section {
            margin-top: 40px;
            text-align: left;
        }

        .galerie-section h4 {
            color: #4a3b32;
            font-size: 1.2rem;
            border-bottom: 2px solid rgba(0,0,0,0.05);
            padding-bottom: 10px;
        }

        .galerie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .galerie-grid img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            background: white;
            border: 2px solid white;
        }
    </style>
