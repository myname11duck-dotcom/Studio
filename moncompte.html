<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mon compte</title><link rel="stylesheet" href="style.css"><style>
body{background:url("télécharger (4).jpg") center/cover fixed;display:flex;justify-content:center;align-items:center;min-height:100vh}
body:before{content:"";position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px)}
.back{position:fixed;top:20px;left:20px;z-index:2;background:#ff8c42;color:#fff;padding:12px 18px;border-radius:30px;text-decoration:none}
.wrap{position:relative;z-index:1;width:95%;max-width:1300px;height:90vh;background:rgba(255,255,255,.12);backdrop-filter:blur(10px);display:flex;border-radius:20px}
.side{width:260px;background:#1d3557;color:#fff;padding:20px}.main{flex:1;display:flex;justify-content:center;align-items:center;flex-direction:column}
canvas{background:#fff;border-radius:15px}.tools button,.tools input{width:100%;margin:8px 0;padding:10px}
</style></head><body><a class="back" href="index.html">🏠 Retour à l'accueil</a><div class="wrap"><div class="side"><h2>Mon Compte</h2><div class="tools"><input type="color" id="c"><input type="range" id="s" min="1" max="30" value="4"><button onclick="e=false">✏️ Crayon</button><button onclick="e=true">🩹 Gomme</button><button onclick="clr()">🗑 Effacer</button><button onclick="dl()">📥 Télécharger</button></div></div><div class="main"><canvas id="cv" width="850" height="600"></canvas></div></div><script>let e=false,cv=document.getElementById('cv'),x=cv.getContext('2d'),d=false;cv.onmousedown=()=>d=true;cv.onmouseup=()=>{d=false;x.beginPath()};cv.onmousemove=f=>{if(!d)return;let r=cv.getBoundingClientRect();x.lineWidth=s.value;x.lineCap='round';x.strokeStyle=e?'white':c.value;x.lineTo(f.clientX-r.left,f.clientY-r.top);x.stroke();x.beginPath();x.moveTo(f.clientX-r.left,f.clientY-r.top)};function clr(){x.clearRect(0,0,cv.width,cv.height)}function dl(){let a=document.createElement('a');a.href=cv.toDataURL();a.download='dessin.png';a.click()}</script></body></html>
