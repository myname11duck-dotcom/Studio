<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Compte | Studio Créatif</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Style global de la page inspiré de ta photo de lys */
        body {
            background: linear-gradient(135deg, #fdf6e2 0%, #fae3d9 50%, #f3bda1 100%);
            background-attachment: fixed;
            margin: 0;
            font-family: sans-serif;
        }

        /* Boîte principale avec effet verre transparent (Glassmorphism) */
        .compte-wrapper { 
            max-width: 750px; 
            margin: 60px auto; 
            padding: 40px 30px; 
            text-align: center; 
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(199, 132, 98, 0.15);
        }

        .compte-wrapper h1 { 
            color: #5c3d2e;
            font-weight: 700;
            margin-bottom: 5px; 
        }

        .compte-wrapper p {
            color: #865439;
            margin-bottom: 30px;
        }

        /* Le tableau de dessin */
        #canvasDessin { 
            border: none;
            border-radius: 15px; 
            background: white; 
            touch-action: none; 
            cursor: crosshair; 
            margin-top: 10px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        /* Les outils et boutons */
        .dessin-outils { 
            margin-top: 25px; 
            display: flex; 
            gap: 15px; 
            justify-content: center; 
            flex-wrap: wrap; 
        }

        .dessin-outils button, .dessin-outils input[type="color"] { 
            padding: 12px 20px; 
            border: 1px solid rgba(255,255,255,0.7); 
            background: rgba(255, 255, 255, 0.8); 
            color: #5c3d2e;
            font-weight: 600;
            cursor: pointer; 
            border-radius: 10px; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .dessin-outils button:hover {
            background: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
        }

        /* Bouton sauvegarder couleur fleur rose/orange */
        .dessin-outils .btn-sauvegarder { 
            background: #d8707c; 
            color: white; 
            border: none; 
        }

        .dessin-outils .btn-sauvegarder:hover { 
            background: #c35360; 
        }

        /* Galerie photos */
        .galerie-dessins { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 20px; 
            margin-top: 30px; 
        }

        .galerie-dessins img { 
            width: 100%; 
            border-radius: 12px; 
            border: 2px solid white; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.06);
            transition: transform 0.3s ease;
        }

        .galerie-dessins img:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="logo">
                <img src="7a6cb36c8ac94c808158e11ac34168d3.jpg" alt="Logo Studio Créatif">
                <div class="logo-text">Studio Créatif<span>Atelier &amp; Design</span></div>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="apropos.html">À propos</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <a href="login.html" class="nav-cta" id="navConnexion" style="margin-right:10px;">Connexion</a>
            <a href="contact.html" class="nav-cta" id="navRdv" style="display:none;">Prendre RDV</a>
            <a href="moncompte.html" class="nav-cta" id="navProfil" style="display:none; margin-right:10px;">👤 Profil</a>
            <button id="navDeconnexion" style="display:none; margin-right:10px; padding:10px 18px; background:transparent; border:1px solid var(--ink); color:var(--ink); cursor:pointer; border-radius:var(--radius);">Se déconnecter</button>
        </nav>
    </header>

    <div class="compte-wrapper">
        <h1 id="bienvenue">Bienvenue !</h1>
        <p>Voici votre espace créatif personnel.</p>

        <h3>🎨 Créer un dessin</h3>
        <canvas id="canvasDessin" width="600" height="400"></canvas>

        <div class="dessin-outils">
            <input type="color" id="couleurPinceau" value="#333333">
            <button id="btnEffacer">Effacer</button>
            <button id="btnSauvegarder" class="btn-sauvegarder">💾 Sauvegarder mon dessin</button>
        </div>
        <p id="messageDessin" style="margin-top:10px;"></p>

        <h3 style="margin-top:40px;">Mes dessins sauvegardés</h3>
        <div class="galerie-dessins" id="galerieDessins"></div>
    </div>

    <script>
        // Vérification de connexion
        const utilisateurJSON = localStorage.getItem('utilisateur');
        if (!utilisateurJSON) {
            window.location.href = 'login.html';
        }
        const utilisateur = JSON.parse(utilisateurJSON);
        document.getElementById('bienvenue').textContent = 'Bienvenue ' + utilisateur.prenom + ' !';

        // Menu (cohérence avec le reste du site)
        const navConnexion = document.getElementById('navConnexion');
        const navRdv = document.getElementById('navRdv');
        const navProfil = document.getElementById('navProfil');
        const navDeconnexion = document.getElementById('navDeconnexion');
        navConnexion.style.display = 'none';
        navRdv.style.display = 'inline-block';
        navProfil.style.display = 'inline-block';
        navProfil.textContent = '👤 ' + utilisateur.prenom;
        navDeconnexion.style.display = 'inline-block';
        navDeconnexion.addEventListener('click', () => {
            localStorage.removeItem('utilisateur');
            window.location.href = 'index.html';
        });

        // Utilise l'adresse de ton site actuel pour communiquer avec le serveur en ligne
        const API_URL = window.location.origin;

        // ----- Zone de dessin -----
        const canvas = document.getElementById('canvasDessin');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';

        let dessinEnCours = false;

        function getPosition(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            return { x, y };
        }

        function commencerDessin(e) {
            dessinEnCours = true;
            const pos = getPosition(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function dessiner(e) {
            if (!dessinEnCours) return;
            e.preventDefault();
            const pos = getPosition(e);
            ctx.strokeStyle = document.getElementById('couleurPinceau').value;
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function arreterDessin() {
            dessinEnCours = false;
        }

        canvas.addEventListener('mousedown', commencerDessin);
        canvas.addEventListener('mousemove', dessiner);
        canvas.addEventListener('mouseup', arreterDessin);
        canvas.addEventListener('mouseleave', arreterDessin);
        canvas.addEventListener('touchstart', commencerDessin);
        canvas.addEventListener('touchmove', dessiner);
        canvas.addEventListener('touchend', arreterDessin);

        document.getElementById('btnEffacer').addEventListener('click', () => {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        });

        const messageDessin = document.getElementById('messageDessin');

        document.getElementById('btnSauvegarder').addEventListener('click', async () => {
            const image_data = canvas.toDataURL('image/png');
            try {
                const res = await fetch(`${API_URL}/api/dessins`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: utilisateur.email, image_data })
                });
                const data = await res.json();
                messageDessin.textContent = data.message;
                messageDessin.style.color = data.success ? 'green' : 'red';
                if (data.success) chargerDessins();
            } catch (err) {
                messageDessin.textContent = 'Impossible de contacter le serveur.';
                messageDessin.style.color = 'red';
            }
        });

        // ----- Charger la galerie -----
        async function chargerDessins() {
            try {
                const res = await fetch(`${API_URL}/api/dessins/${utilisateur.email}`);
                const dessins = await res.json();
                const galerie = document.getElementById('galerieDessins');
                galerie.innerHTML = '';
                dessins.forEach(d => {
                    const img = document.createElement('img');
                    img.src = d.image_data;
                    galerie.appendChild(img);
                });
            } catch (err) {
                console.error('Erreur chargement dessins', err);
            }
        }

        chargerDessins();
    </script>
</body>
</html>
