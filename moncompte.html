<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mon Compte | Espace Créatif</title>

    <link rel="stylesheet" href="moncompte.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="background"></div>

    <header>

        <div class="logo">
            <i class="fa-solid fa-palette"></i>
            <span>Espace Créatif</span>
        </div>

        <div class="header-right">

            <button class="notification">
                <i class="fa-solid fa-bell"></i>
            </button>

            <div class="user">

                <img src="images/avatar.png" alt="profil">

                <div>

                    <h3>Mano</h3>

                    <p>Membre Premium</p>

                </div>

            </div>

        </div>

    </header>

    <div class="container">

        <aside class="sidebar">

            <div class="profile-card">

                <img src="images/avatar.png" alt="Profil">

                <h2>Mano</h2>

                <span>mano@email.com</span>

                <div class="stats">

                    <div>

                        <h3>12</h3>

                        <p>Dessins</p>

                    </div>

                    <div>

                        <h3>4</h3>

                        <p>Favoris</p>

                    </div>

                </div>

            </div>

            <nav>

                <a href="index.html">
                    <i class="fa-solid fa-house"></i>
                    Accueil
                </a>

                <a href="#" id="sidebarNewCanvas">
                    <i class="fa-solid fa-palette"></i>
                    Nouveau dessin
                </a>

                <a href="#">
                    <i class="fa-solid fa-folder-open"></i>
                    Mes dessins
                </a>

                <a href="#">
                    <i class="fa-solid fa-heart"></i>
                    Favoris
                </a>

                <a href="parametres.html">
                    <i class="fa-solid fa-gear"></i>
                    Paramètres
                </a>

            </nav>

        </aside>

        <main>

            <section class="top">

                <div>

                    <h1>Mon espace créatif</h1>

                    <p>
                        Laissez parler votre imagination.
                    </p>

                </div>

                <button class="save" id="saveBtn">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    Sauvegarder
                </button>

            </section>

            <section class="toolbar">

                <div>

                    <label>Couleur</label>

                    <input type="color" id="colorPicker" value="#1a1412">

                </div>

                <div>

                    <label>Taille</label>

                    <input type="range"
                        id="brushSize"
                        min="1"
                        max="50"
                        value="5">

                </div>

                <button id="pencil" class="active">
                    ✏️ Crayon
                </button>

                <button id="eraser">
                    🩹 Gomme
                </button>

                <button id="newCanvasBtn">
                    📄 Nouvelle toile
                </button>

                <button id="undo">
                    ↩ Annuler
                </button>

                <button id="redo">
                    ↪ Refaire
                </button>

                <button id="clear">
                    🗑 Effacer
                </button>

                <button id="download" class="download">
                    📥 Télécharger
                </button>

            </section>

            <section class="canvas-card">

                <canvas
                    id="canvas"
                    width="1200"
                    height="700">
                </canvas>

            </section>

            <section class="gallery">

                <h2>Mes créations</h2>

                <div class="gallery-grid" id="galleryGrid">

                    <div class="drawing">
                        <img src="images/demo1.jpg">
                    </div>

                    <div class="drawing">
                        <img src="images/demo2.jpg">
                    </div>

                    <div class="drawing">
                        <img src="images/demo3.jpg">
                    </div>

                    <div class="drawing add" id="addDrawingBtn">

                        <i class="fa-solid fa-plus"></i>

                    </div>

                </div>

            </section>

        </main>

    </div>

    <script src="moncompte.js"></script>

</body>

</html>
