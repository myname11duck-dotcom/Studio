<!-- moncompte.html - Version avec cadre autour de la toile -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Créatif | Studio Créatif</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== MÊME THÈME QUE LE SITE ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --pink-deep: #c98a3e;
            --pink-mid: #e3a544;
            --pink-soft: #ffe9a8;
            --pink-pale: #fffbf2;
            --ink: #4a2f17;
            --ink-soft: rgba(74, 47, 23, 0.62);
            --gold: #f6c667;
            --bg: #fffdf7;
            --radius: 18px;
        }

        html, body {
            font-family: 'Montserrat', sans-serif;
            color: var(--ink);
            background: var(--bg);
            scroll-behavior: smooth;
            min-height: 100vh;
        }

        /* HEADER */
        header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 250, 249, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(233, 79, 130, 0.08);
            padding: 0 6%;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo i {
            color: var(--pink-deep);
            font-size: 28px;
        }

        .logo span {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--ink);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-profile-header {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 6px 12px 6px 6px;
            border-radius: 30px;
            background: var(--pink-pale);
            transition: background 0.3s;
            border: 1px solid rgba(74, 47, 23, 0.1);
            text-decoration: none;
            color: var(--ink);
        }
        .user-profile-header:hover {
            background: var(--pink-soft);
        }
        .user-profile-header img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--pink-deep);
        }
        .user-profile-header span {
            font-size: 14px;
            font-weight: 500;
        }
        .user-profile-header .fa-chevron-down {
            color: var(--ink-soft);
            font-size: 12px;
        }

        /* CONTAINER */
        .container {
            display: flex;
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 6%;
            gap: 40px;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            flex-shrink: 0;
        }

        .profile-card {
            background: #fff;
            border-radius: var(--radius);
            padding: 30px 20px;
            text-align: center;
            border: 1px solid rgba(74, 47, 23, 0.06);
            box-shadow: 0 12px 30px rgba(150,100,30,0.06);
            margin-bottom: 20px;
        }

        .profile-avatar-upload {
            position: relative;
            display: inline-block;
            cursor: pointer;
        }
        .profile-avatar-upload img {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--pink-deep);
            padding: 3px;
            transition: opacity 0.3s;
        }
        .profile-avatar-upload:hover img {
            opacity: 0.7;
        }
        .profile-avatar-upload .upload-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }
        .profile-avatar-upload:hover .upload-overlay {
            opacity: 1;
        }
        .profile-avatar-upload input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .profile-card h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            margin-top: 14px;
            color: var(--ink);
        }

        .profile-card span {
            font-size: 13px;
            color: var(--ink-soft);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(74, 47, 23, 0.08);
        }
        .stats h3 {
            color: var(--pink-deep);
            font-size: 20px;
            font-family: 'Cormorant Garamond', serif;
        }
        .stats p {
            font-size: 12px;
            color: var(--ink-soft);
        }

        /* NAV SIDEBAR */
        .sidebar nav {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .sidebar nav a {
            color: var(--ink-soft);
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 12px;
            transition: all 0.3s ease;
            display: flex;
            gap: 14px;
            align-items: center;
            font-size: 14px;
            font-weight: 500;
        }
        .sidebar nav a:hover {
            background: var(--pink-pale);
            color: var(--pink-deep);
        }
        .sidebar nav a.active {
            background: linear-gradient(135deg, var(--pink-deep), var(--pink-mid));
            color: #fff;
            box-shadow: 0 6px 14px rgba(233, 79, 130, 0.3);
        }
        .sidebar nav a i {
            font-size: 17px;
            width: 20px;
            text-align: center;
        }

        /* MAIN */
        main {
            flex: 1;
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .top h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 34px;
            font-weight: 600;
            color: var(--ink);
        }
        .top p {
            color: var(--ink-soft);
            font-size: 14px;
            margin-top: 4px;
        }

        .save {
            background: linear-gradient(135deg, var(--pink-deep), var(--pink-mid));
            color: #fff;
            border: none;
            padding: 12px 26px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(212, 139, 71, 0.3);
        }
        .save:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(212, 139, 71, 0.45);
        }

        /* TOOLBAR */
        .toolbar {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            padding: 14px 18px;
            border-radius: var(--radius);
            background: #fff;
            border: 1px solid rgba(74, 47, 23, 0.06);
            box-shadow: 0 4px 15px rgba(150,100,30,0.05);
            margin-bottom: 25px;
        }
        .toolbar > div {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-right: 12px;
            border-right: 1px solid rgba(74, 47, 23, 0.08);
        }
        .toolbar label {
            font-size: 12px;
            font-weight: 500;
            color: var(--ink-soft);
        }
        input[type="color"] {
            -webkit-appearanse: none;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            background: transparent;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: 2px solid rgba(74, 47, 23, 0.15);
            border-radius: 50%;
        }
        input[type="range"] {
            accent-color: var(--pink-deep);
            width: 100px;
            cursor: pointer;
        }

        .toolbar .brush-tools {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 0 10px;
            border-right: 1px solid rgba(74, 47, 23, 0.08);
        }
        .toolbar .brush-tools .brush-label {
            font-size: 11px;
            color: var(--ink-soft);
            margin-right: 4px;
        }
        .toolbar .brush-tools button {
            border: 1px solid rgba(74, 47, 23, 0.1);
            padding: 6px 10px;
            border-radius: 10px;
            cursor: pointer;
            background: #fff;
            color: var(--ink-soft);
            font-size: 14px;
            transition: all 0.2s ease;
        }
        .toolbar .brush-tools button:hover {
            background: var(--pink-pale);
            color: var(--pink-deep);
        }
        .toolbar .brush-tools button.active {
            background: var(--pink-deep);
            color: #fff;
            border-color: var(--pink-deep);
            box-shadow: 0 4px 12px rgba(201, 138, 62, 0.3);
        }

        .toolbar button:not(.brush-tools button) {
            border: 1px solid rgba(74, 47, 23, 0.1);
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            background: #fff;
            color: var(--ink-soft);
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .toolbar button:not(.brush-tools button):hover {
            background: var(--pink-pale);
            color: var(--pink-deep);
        }
        .toolbar button:not(.brush-tools button).active {
            background: var(--pink-deep);
            color: #fff;
            border-color: var(--pink-deep);
        }
        .toolbar .download {
            margin-left: auto;
            background: var(--pink-deep);
            color: #fff;
            border-color: var(--pink-deep);
        }
        .toolbar .download:hover {
            background: var(--pink-mid);
            border-color: var(--pink-mid);
        }

        /* ===== CANVAS AVEC CADRE ===== */
        .canvas-wrapper {
            background: #fff;
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid rgba(74, 47, 23, 0.06);
            box-shadow: 0 4px 15px rgba(150,100,30,0.05);
            position: relative;
        }

        /* Cadre décoratif autour de la toile */
        .canvas-frame {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 
                0 0 0 2px rgba(201, 138, 62, 0.2),
                0 0 0 6px #fcfaf7,
                0 0 0 8px rgba(201, 138, 62, 0.15),
                0 0 0 12px #fcfaf7,
                0 8px 32px rgba(74, 47, 23, 0.12);
            background: #fcfaf7;
            transition: box-shadow 0.3s ease;
        }

        .canvas-frame:hover {
            box-shadow: 
                0 0 0 2px rgba(201, 138, 62, 0.3),
                0 0 0 6px #fcfaf7,
                0 0 0 8px rgba(201, 138, 62, 0.25),
                0 0 0 12px #fcfaf7,
                0 12px 48px rgba(201, 138, 62, 0.2);
        }

        /* Coins décoratifs du cadre */
        .canvas-frame::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            width: 30px;
            height: 30px;
            border-top: 3px solid var(--pink-deep);
            border-left: 3px solid var(--pink-deep);
            border-radius: 4px 0 0 0;
            z-index: 5;
            opacity: 0.6;
            pointer-events: none;
        }

        .canvas-frame::after {
            content: '';
            position: absolute;
            top: -4px;
            right: -4px;
            width: 30px;
            height: 30px;
            border-top: 3px solid var(--pink-deep);
            border-right: 3px solid var(--pink-deep);
            border-radius: 0 4px 0 0;
            z-index: 5;
            opacity: 0.6;
            pointer-events: none;
        }

        /* Coins inférieurs */
        .canvas-frame .corner-br {
            position: absolute;
            bottom: -4px;
            right: -4px;
            width: 30px;
            height: 30px;
            border-bottom: 3px solid var(--pink-deep);
            border-right: 3px solid var(--pink-deep);
            border-radius: 0 0 4px 0;
            z-index: 5;
            opacity: 0.6;
            pointer-events: none;
        }

        .canvas-frame .corner-bl {
            position: absolute;
            bottom: -4px;
            left: -4px;
            width: 30px;
            height: 30px;
            border-bottom: 3px solid var(--pink-deep);
            border-left: 3px solid var(--pink-deep);
            border-radius: 0 0 0 4px;
            z-index: 5;
            opacity: 0.6;
            pointer-events: none;
        }

        /* Ombre intérieure pour effet de profondeur */
        .canvas-frame .inner-shadow {
            position: absolute;
            inset: 0;
            border-radius: 12px;
            box-shadow: inset 0 2px 20px rgba(74, 47, 23, 0.06);
            pointer-events: none;
            z-index: 2;
        }

        canvas {
            width: 100%;
            display: block;
            border-radius: 12px;
            position: relative;
            z-index: 1;
            background: #fcfaf7;
            cursor: crosshair;
        }

        /* Petit badge "Toile" en bas à droite */
        .canvas-badge {
            position: absolute;
            bottom: 16px;
            right: 16px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 500;
            color: var(--ink-soft);
            border: 1px solid rgba(74, 47, 23, 0.06);
            z-index: 3;
            letter-spacing: 0.5px;
            pointer-events: none;
        }

        .canvas-badge i {
            color: var(--pink-deep);
            margin-right: 4px;
        }

        /* GALERIE */
        .gallery {
            margin-top: 40px;
        }
        .gallery h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--ink);
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .drawing {
            background: #fff;
            border: 1px solid rgba(74, 47, 23, 0.06);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            aspect-ratio: 4/3;
            position: relative;
        }
        .drawing:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(150,100,30,0.15);
            border-color: var(--pink-deep);
        }
        .drawing img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .drawing .drawing-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 4px 8px;
            font-size: 11px;
            text-align: center;
            backdrop-filter: blur(4px);
        }
        .drawing .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        .drawing .delete-btn:hover {
            background: rgba(200, 50, 50, 0.8);
        }
        .add {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            color: var(--pink-deep);
            border: 2px dashed rgba(201, 138, 62, 0.3);
            background: transparent;
        }
        .add:hover {
            border-color: var(--pink-deep);
            background: rgba(201, 138, 62, 0.05);
        }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
            }
            .toolbar {
                justify-content: flex-start;
            }
            .toolbar .download {
                margin-left: 0;
            }
            .canvas-frame::before,
            .canvas-frame::after,
            .canvas-frame .corner-br,
            .canvas-frame .corner-bl {
                display: none;
            }
            .canvas-frame {
                box-shadow: 
                    0 0 0 2px rgba(201, 138, 62, 0.15),
                    0 8px 32px rgba(74, 47, 23, 0.1);
            }
        }
        @media (max-width: 640px) {
            header {
                padding: 0 20px;
                height: 60px;
            }
            main {
                padding: 0;
            }
            .top {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            .toolbar > div {
                border-right: none;
                padding-right: 0;
            }
            .toolbar .brush-tools {
                border-right: none;
                padding: 0;
            }
            .canvas-wrapper {
                padding: 12px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fa-solid fa-palette"></i>
            <span>Studio Créatif</span>
        </div>
        <div class="header-right">
            <div class="user-profile-header" id="headerUser">
                <img src="images/avatar.png" alt="profil" id="headerAvatar">
                <span id="headerNom">Mon compte</span>
                <i class="fa-solid fa-chevron-down"></i>
            </div>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <div class="profile-card">
                <div class="profile-avatar-upload" id="avatarUpload">
                    <img src="images/avatar.png" alt="Profil" id="profileAvatar">
                    <div class="upload-overlay"><i class="fa-solid fa-camera"></i></div>
                    <input type="file" accept="image/*" id="avatarInput">
                </div>
                <h2 id="profileNom">Mon compte</h2>
                <span id="profileEmail">email@exemple.com</span>
                <div class="stats">
                    <div>
                        <h3 id="statsDessins">0</h3>
                        <p>Dessins</p>
                    </div>
                    <div>
                        <h3 id="statsFavoris">0</h3>
                        <p>Favoris</p>
                    </div>
                </div>
            </div>

            <nav>
                <a href="index.html">
                    <i class="fa-solid fa-house"></i>
                    Accueil
                </a>
                <a href="moncompte.html" class="active">
                    <i class="fa-solid fa-palette"></i>
                    Mon espace
                </a>
                <a href="parametres.html">
                    <i class="fa-solid fa-gear"></i>
                    Paramètres
                </a>
            </nav>
        </aside>

        <main>
            <section class="top">
                <div>
                    <h1>Mon espace créatif</h1>
                    <p>Laissez parler votre imagination.</p>
                </div>
                <button class="save" id="saveBtn">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    Sauvegarder
                </button>
            </section>

            <section class="toolbar">
                <div>
                    <label>Couleur</label>
                    <input type="color" id="colorPicker" value="#4a2f17">
                </div>
                <div>
                    <label>Taille</label>
                    <input type="range" id="brushSize" min="1" max="50" value="5">
                </div>
                <div class="brush-tools">
                    <span class="brush-label">Pinceau</span>
                    <button class="brush-type active" data-type="classic" title="Classique">✏️</button>
                    <button class="brush-type" data-type="marker" title="Marqueur">🖊️</button>
                    <button class="brush-type" data-type="spray" title="Aérosol">💨</button>
                    <button class="brush-type" data-type="watercolor" title="Aquarelle">🎨</button>
                    <button class="brush-type" data-type="calligraphy" title="Calligraphie">🖋️</button>
                    <button class="brush-type" data-type="pencil" title="Crayon">✎</button>
                </div>
                <button id="pencil" class="active">✏️ Crayon</button>
                <button id="eraser">🩹 Gomme</button>
                <button id="newCanvasBtn">📄 Nouvelle toile</button>
                <button id="undo">↩ Annuler</button>
                <button id="redo">↪ Refaire</button>
                <button id="clear">🗑 Effacer</button>
                <button id="download" class="download">📥 Télécharger</button>
            </section>

            <!-- ===== CANVAS AVEC CADRE ===== -->
            <section class="canvas-wrapper">
                <div class="canvas-frame">
                    <div class="inner-shadow"></div>
                    <div class="corner-br"></div>
                    <div class="corner-bl"></div>
                    <canvas id="canvas" width="1200" height="700"></canvas>
                    <div class="canvas-badge">
                        <i class="fa-solid fa-paintbrush"></i> Toile
                    </div>
                </div>
            </section>

            <section class="gallery">
                <h2>Mes créations</h2>
                <div class="gallery-grid" id="galleryGrid"></div>
            </section>
        </main>
    </div>

    <script>
        // ===== CHARGEMENT DES INFOS UTILISATEUR =====
        function loadUserInfo() {
            const user = JSON.parse(localStorage.getItem('utilisateur') || 'null');
            if (user) {
                document.getElementById('profileNom').textContent = user.prenom || 'Mon compte';
                document.getElementById('profileEmail').textContent = user.email || '';
                document.getElementById('headerNom').textContent = user.prenom || 'Mon compte';
                
                const avatar = localStorage.getItem('userAvatar') || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.prenom || 'User') + '&background=c98a3e&color=fff&size=128';
                document.getElementById('profileAvatar').src = avatar;
                document.getElementById('headerAvatar').src = avatar;
            }
        }

        // ===== UPLOAD AVATAR =====
        document.getElementById('avatarInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const dataUrl = event.target.result;
                    localStorage.setItem('userAvatar', dataUrl);
                    document.getElementById('profileAvatar').src = dataUrl;
                    document.getElementById('headerAvatar').src = dataUrl;
                };
                reader.readAsDataURL(file);
            }
        });

        // ===== STATS =====
        function updateStats() {
            const dessins = JSON.parse(localStorage.getItem('studio_dessins') || '[]');
            document.getElementById('statsDessins').textContent = dessins.length;
            document.getElementById('statsFavoris').textContent = dessins.filter(d => d.favori).length;
        }

        loadUserInfo();
        updateStats();
        window.addEventListener('storage', function(e) {
            if (e.key === 'utilisateur' || e.key === 'userAvatar') loadUserInfo();
            if (e.key === 'studio_dessins') updateStats();
        });
    </script>

    <script src="moncompte.js"></script>
</body>
</html>
