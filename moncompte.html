<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Compte</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    background:url("images/plage.jpg") center/cover no-repeat fixed;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
    backdrop-filter:blur(5px);
}

.container{
    position:relative;
    width:95%;
    max-width:1400px;
    height:90vh;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    border-radius:25px;
    display:flex;
    overflow:hidden;
    box-shadow:0 0 30px rgba(0,0,0,.3);
}

.sidebar{
    width:280px;
    background:rgba(255,255,255,.18);
    padding:25px;
    color:white;
}

.sidebar h2{
    text-align:center;
    margin-bottom:20px;
}

.profile{
    text-align:center;
    margin-bottom:30px;
}

.profile img{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
}

.profile h3{
    margin-top:10px;
}

.tool{
    margin-top:20px;
}

.tool label{
    display:block;
    margin-bottom:8px;
}

input[type=color]{
    width:100%;
    height:45px;
    border:none;
}

input[type=range]{
    width:100%;
}

button{
    width:100%;
    padding:13px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

button:hover{
    transform:scale(1.03);
}

.draw{
    background:#3b82f6;
    color:white;
}

.erase{
    background:#ef4444;
    color:white;
}

.download{
    background:#10b981;
    color:white;
}

.publish{
    background:#f59e0b;
    color:white;
}

.clear{
    background:#6b7280;
    color:white;
}

.main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

canvas{
    background:white;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<div class="profile">

<img src="images/avatar.png">

<h3>Mon Compte</h3>

<p>Utilisateur connecté</p>

</div>

<div class="tool">

<label>Couleur</label>

<input type="color" id="color" value="#000000">

</div>

<div class="tool">

<label>Taille</label>

<input type="range" id="size" min="1" max="40" value="5">

</div>

<button class="draw" onclick="drawMode()">✏️ Crayon</button>

<button class="erase" onclick="eraseMode()">🩹 Gomme</button>

<button class="clear" onclick="clearCanvas()">🗑 Effacer</button>

<button class="download" onclick="download()">⬇ Télécharger</button>

<button class="publish">📤 Publier</button>

</div>

<div class="main">

<canvas id="canvas" width="900" height="650"></canvas>

</div>

</div>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let drawing=false;
let erase=false;

canvas.addEventListener("mousedown",()=>drawing=true);

canvas.addEventListener("mouseup",()=>{
drawing=false;
ctx.beginPath();
});

canvas.addEventListener("mousemove",draw);

function draw(e){

if(!drawing)return;

ctx.lineWidth=document.getElementById("size").value;
ctx.lineCap="round";

if(erase){
ctx.strokeStyle="white";
}else{
ctx.strokeStyle=document.getElementById("color").value;
}

const rect=canvas.getBoundingClientRect();

ctx.lineTo(
e.clientX-rect.left,
e.clientY-rect.top
);

ctx.stroke();

ctx.beginPath();

ctx.moveTo(
e.clientX-rect.left,
e.clientY-rect.top
);

}

function drawMode(){
erase=false;
}

function eraseMode(){
erase=true;
}

function clearCanvas(){

ctx.clearRect(0,0,canvas.width,canvas.height);

}

function download(){

const link=document.createElement("a");

link.download="dessin.png";

link.href=canvas.toDataURL();

link.click();

}

</script>

</body>
</html>
