<!-- parametres.html - Version avec le même thème -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramètres | Studio Créatif</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== MÊME THÈME QUE LE SITE ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --pink-deep: #c98a3e;
            --pink-mid: #e3a544;
            --pink-soft: #ffe9a8;
            --pink-pale: #fffbf2;
            --ink: #4a2f17;
            --ink-soft: rgba(74, 47, 23, 0.62);
            --gold: #f6c667;
            --bg: #fffdf7;
            --radius: 18px;
        }

        html, body {
            font-family: 'Montserrat', sans-serif;
            color: var(--ink);
            background: var(--bg);
            scroll-behavior: smooth;
            min-height: 100vh;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 250, 249, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(233, 79, 130, 0.08);
            padding: 0 6%;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo i {
            color: var(--pink-deep);
            font-size: 28px;
        }
        .logo span {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--ink);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-profile-header {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 6px 12px 6px 6px;
            border-radius: 30px;
            background: var(--pink-pale);
            transition: background 0.3s;
            border: 1px solid rgba(74, 47, 23, 0.1);
            text-decoration: none;
            color: var(--ink);
        }
        .user-profile-header:hover {
            background: var(--pink-soft);
        }
        .user-profile-header img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--pink-deep);
        }
        .user-profile-header span {
            font-size: 14px;
            font-weight: 500;
        }

        .container {
            display: flex;
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 6%;
            gap: 40px;
        }

        .sidebar {
            width: 280px;
            flex-shrink: 0;
        }

        .profile-card {
            background: #fff;
            border-radius: var(--radius);
            padding: 30px 20px;
            text-align: center;
            border: 1px solid rgba(74, 47, 23, 0.06);
            box-shadow: 0 12px 30px rgba(150,100,30,0.06);
            margin-bottom: 20px;
        }

        .profile-avatar-upload {
            position: relative;
            display: inline-block;
            cursor: pointer;
        }
        .profile-avatar-upload img {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--pink-deep);
            padding: 3px;
            transition: opacity 0.3s;
        }
        .profile-avatar-upload:hover img {
            opacity: 0.7;
        }
        .profile-avatar-upload .upload-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }
        .profile-avatar-upload:hover .upload-overlay {
            opacity: 1;
        }
        .profile-avatar-upload input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .profile-card h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            margin-top: 14px;
            color: var(--ink);
        }
        .profile-card span {
            font-size: 13px;
            color: var(--ink-soft);
        }

        .sidebar nav {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .sidebar nav a {
            color: var(--ink-soft);
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 12px;
            transition: all 0.3s ease;
            display: flex;
            gap: 14px;
            align-items: center;
            font-size: 14px;
            font-weight: 500;
        }
        .sidebar nav a:hover {
            background: var(--pink-pale);
            color: var(--pink-deep);
        }
        .sidebar nav a.active {
            background: linear-gradient(135deg, var(--pink-deep), var(--pink-mid));
            color: #fff;
            box-shadow: 0 6px 14px rgba(233, 79, 130, 0.3);
        }

        main {
            flex: 1;
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .top h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 34px;
            font-weight: 600;
            color: var(--ink);
        }
        .top p {
            color: var(--ink-soft);
            font-size: 14px;
            margin-top: 4px;
        }

        /* SETTINGS CARD */
        .settings-card {
            background: #fff;
            border-radius: var(--radius);
            padding: 35px;
            border: 1px solid rgba(74, 47, 23, 0.06);
            box-shadow: 0 4px 15px rgba(150,100,30,0.05);
            max-width: 560px;
        }

        .settings-row {
            display: flex;
            gap: 20px;
        }
        .settings-row .form-group {
            flex: 1;
        }

        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--ink-soft);
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(74, 47, 23, 0.15);
            background: var(--pink-pale);
            color: var(--ink);
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--pink-deep);
            box-shadow: 0 0 0 3px rgba(201, 138, 62, 0.15);
        }

        .settings-divider {
            height: 1px;
            background: rgba(74, 47, 23, 0.08);
            margin: 10px 0 24px;
        }

        .save {
            background: linear-gradient(135deg, var(--pink-deep), var(--pink-mid));
            color: #fff;
            border: none;
            padding: 12px 26px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(212, 139, 71, 0.3);
            width: 100%;
            justify-content: center;
        }
        .save:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(212, 139, 71, 0.45);
        }

        .settings-message {
            margin-top: 16px;
            font-size: 13.5px;
            text-align: center;
            min-height: 18px;
        }
        .settings-message.success { color: #4caf50; }
        .settings-message.error { color: #f44336; }

        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
            }
        }
        @media (max-width: 640px) {
            header {
                padding: 0 20px;
                height: 60px;
            }
            .settings-card {
                padding: 20px;
            }
            .settings-row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fa-solid fa-palette"></i>
            <span>Studio Créatif</span>
        </div>
        <div class="header-right">
            <div class="user-profile-header" id="headerUser">
                <img src="images/avatar.png" alt="profil" id="headerAvatar">
                <span id="headerNom">Mon compte</span>
            </div>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <div class="profile-card">
                <div class="profile-avatar-upload" id="avatarUpload">
                    <img src="images/avatar.png" alt="Profil" id="profileAvatar">
                    <div class="upload-overlay"><i class="fa-solid fa-camera"></i></div>
                    <input type="file" accept="image/*" id="avatarInput">
                </div>
                <h2 id="profileNom">Mon compte</h2>
                <span id="profileEmail">email@exemple.com</span>
            </div>

            <nav>
                <a href="index.html">
                    <i class="fa-solid fa-house"></i>
                    Accueil
                </a>
                <a href="moncompte.html">
                    <i class="fa-solid fa-palette"></i>
                    Mon espace
                </a>
                <a href="parametres.html" class="active">
                    <i class="fa-solid fa-gear"></i>
                    Paramètres
                </a>
            </nav>
        </aside>

        <main>
            <section class="top">
                <div>
                    <h1>Paramètres du compte</h1>
                    <p>Gérez vos informations personnelles et votre mot de passe.</p>
                </div>
            </section>

            <section class="settings-card">
                <form id="settingsForm">
                    <div class="settings-row">
                        <div class="form-group">
                            <label for="nom">Nom</label>
                            <input type="text" id="nom" required>
                        </div>
                        <div class="form-group">
                            <label for="prenom">Prénom</label>
                            <input type="text" id="prenom" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required>
                    </div>

                    <div class="settings-divider"></div>

                    <div class="form-group">
                        <label for="motDePasse">Nouveau mot de passe</label>
                        <input type="password" id="motDePasse" placeholder="Laisser vide pour ne pas changer">
                    </div>

                    <div class="form-group">
                        <label for="motDePasseConfirm">Confirmer le mot de passe</label>
                        <input type="password" id="motDePasseConfirm" placeholder="Laisser vide pour ne pas changer">
                    </div>

                    <button type="submit" class="save">
                        <i class="fa-solid fa-check"></i>
                        Enregistrer les modifications
                    </button>

                    <p class="settings-message" id="settingsMessage"></p>
                </form>
            </section>
        </main>
    </div>

    <script>
        // ===== CHARGEMENT DES INFOS UTILISATEUR =====
        function loadUserInfo() {
            const user = JSON.parse(localStorage.getItem('utilisateur') || 'null');
            if (user) {
                document.getElementById('profileNom').textContent = user.prenom || 'Mon compte';
                document.getElementById('profileEmail').textContent = user.email || '';
                document.getElementById('headerNom').textContent = user.prenom || 'Mon compte';
                document.getElementById('nom').value = user.nom || '';
                document.getElementById('prenom').value = user.prenom || '';
                document.getElementById('email').value = user.email || '';
                
                const avatar = localStorage.getItem('userAvatar') || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.prenom || 'User') + '&background=c98a3e&color=fff&size=128';
                document.getElementById('profileAvatar').src = avatar;
                document.getElementById('headerAvatar').src = avatar;
            }
        }

        // ===== UPLOAD AVATAR =====
        document.getElementById('avatarInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const dataUrl = event.target.result;
                    localStorage.setItem('userAvatar', dataUrl);
                    document.getElementById('profileAvatar').src = dataUrl;
                    document.getElementById('headerAvatar').src = dataUrl;
                };
                reader.readAsDataURL(file);
            }
        });

        // ===== SAUVEGARDE DES PARAMÈTRES =====
        const settingsForm = document.getElementById('settingsForm');
        const settingsMessage = document.getElementById('settingsMessage');

        settingsForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const nom = document.getElementById('nom').value;
            const prenom = document.getElementById('prenom').value;
            const email = document.getElementById('email').value;
            const motDePasse = document.getElementById('motDePasse').value;
            const motDePasseConfirm = document.getElementById('motDePasseConfirm').value;

            if (motDePasse && motDePasse !== motDePasseConfirm) {
                settingsMessage.textContent = 'Les mots de passe ne correspondent pas.';
                settingsMessage.className = 'settings-message error';
                return;
            }

            // Mise à jour locale
            const user = JSON.parse(localStorage.getItem('utilisateur') || '{}');
            user.nom = nom;
            user.prenom = prenom;
            user.email = email;
            localStorage.setItem('utilisateur', JSON.stringify(user));

            try {
                const payload = { nom, prenom, email };
                if (motDePasse) payload.mot_de_passe = motDePasse;

                const res = await fetch(`/api/utilisateur/${encodeURIComponent(user.email)}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                settingsMessage.textContent = data.message || 'Profil mis à jour !';
                settingsMessage.className = 'settings-message ' + (data.success ? 'success' : 'error');

                if (data.success) {
                    document.getElementById('motDePasse').value = '';
                    document.getElementById('motDePasseConfirm').value = '';
                    loadUserInfo();
                }
            } catch (err) {
                settingsMessage.textContent = 'Profil mis à jour localement !';
                settingsMessage.className = 'settings-message success';
                loadUserInfo();
            }
        });

        loadUserInfo();
        window.addEventListener('storage', loadUserInfo);
    </script>
</body>
</html>
